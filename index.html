<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Wallet App</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons CDN for visual elements -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom styles for a cleaner UI */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #1f2937;
        }
        .dark body {
            background-color: #111827;
            color: #e5e7eb;
        }
        .container {
            max-width: 960px;
        }
        .icon {
            display: inline-block;
            vertical-align: middle;
        }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen flex items-center justify-center p-4">
        <!-- App content will be dynamically loaded here by JavaScript -->
    </div>

    <script>
        // === Global State Management ===
        let state = {
            token: localStorage.getItem('token') || null,
            isLoggedIn: false,
            wallet: null,
            balance: null,
            usdcBalance: null,
            history: [],
            anchorTxs: [],
            message: '',
            error: '',
            // The 'view' determines which main UI section to display
            view: 'auth' // 'auth' or 'dashboard'
        };

        const API_BASE_URL = 'http://localhost:4000/api';
        const appContainer = document.getElementById('app');

        // === API Fetch Helper Function ===
        async function fetchApi(endpoint, method = 'GET', body = null) {
            const headers = {
                'Content-Type': 'application/json',
            };
            if (state.token) {
                headers['Authorization'] = `Bearer ${state.token}`;
            }

            const options = { method, headers };
            if (body) {
                options.body = JSON.stringify(body);
            }

            try {
                const response = await fetch(`${API_BASE_URL}/${endpoint}`, options);
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Something went wrong');
                }
                return data;
            } catch (err) {
                console.error('API Error:', err.message);
                state.error = err.message;
                render();
                return null;
            }
        }

        // === UI Rendering Functions ===

        // The main render function that updates the entire UI
        function render() {
            state.message = '';
            state.error = '';

            appContainer.innerHTML = ''; // Clear the previous content
            if (state.view === 'auth') {
                appContainer.innerHTML = renderAuthPage();
                attachAuthEvents();
            } else if (state.view === 'dashboard') {
                appContainer.innerHTML = renderDashboardPage();
                attachDashboardEvents();
            }

            // Manually initialize Lucide icons after rendering the HTML
            lucide.createIcons();
        }
        
        // Renders the authentication view (Login/Register)
        function renderAuthPage() {
            const messageHtml = state.message ? `<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-4">${state.message}</div>` : '';
            const errorHtml = state.error ? `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4">${state.error}</div>` : '';
            
            return `
                <div class="flex flex-col items-center justify-center p-4">
                    <h1 class="text-3xl font-bold mb-6 text-gray-800 dark:text-gray-100">Stellar Wallet API App</h1>
                    <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-md">
                        <div class="text-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Login / Register</h2>
                        </div>
                        ${errorHtml}
                        ${messageHtml}
                        
                        <!-- Login Form -->
                        <form id="login-form" class="space-y-4">
                            <h2 class="text-xl font-semibold text-gray-900 dark:text-white flex items-center gap-2"><i data-lucide="log-in" class="icon"></i> Log In</h2>
                            <div>
                                <label class="block text-gray-700 dark:text-gray-300">Username</label>
                                <input type="text" id="login-username" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white p-2" required />
                            </div>
                            <div>
                                <label class="block text-gray-700 dark:text-gray-300">Password</label>
                                <input type="password" id="login-password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white p-2" required />
                            </div>
                            <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors duration-200">
                                Log In
                            </button>
                        </form>

                        <hr class="my-6 border-gray-300 dark:border-gray-600" />
                        
                        <!-- Registration Form -->
                        <form id="register-form" class="space-y-4">
                            <h2 class="text-xl font-semibold text-gray-900 dark:text-white flex items-center gap-2"><i data-lucide="user-plus" class="icon"></i> Register</h2>
                            <div>
                                <label class="block text-gray-700 dark:text-gray-300">Username</label>
                                <input type="text" id="register-username" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white p-2" required />
                            </div>
                            <div>
                                <label class="block text-gray-700 dark:text-gray-300">Password</label>
                                <input type="password" id="register-password" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 dark:bg-gray-700 dark:border-gray-600 dark:text-white p-2" required />
                            </div>
                            <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition-colors duration-200">
                                Register
                            </button>
                        </form>
                    </div>
                </div>
            `;
        }

        // Renders the dashboard view
        function renderDashboardPage() {
            const messageHtml = state.message ? `<div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded-lg mb-4">${state.message}</div>` : '';
            const errorHtml = state.error ? `<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4">${state.error}</div>` : '';
            
            const walletHtml = state.wallet ? `
                <div class="space-y-6">
                    <!-- Wallet and Balance Section -->
                    <div class="bg-gray-100 dark:bg-gray-700 p-6 rounded-lg shadow-inner">
                        <h2 class="text-xl font-semibold text-gray-900 dark:text-white flex items-center gap-2 mb-2"><i data-lucide="wallet" class="icon"></i> My Wallet</h2>
                        <p class="font-mono break-all text-gray-700 dark:text-gray-300 mb-2">
                            <strong>Public Key:</strong> ${state.wallet.publicKey}
                        </p>
                        <div class="flex items-center gap-4 mt-2">
                            <div class="flex-1">
                                <p class="text-sm text-gray-600 dark:text-gray-400">XLM</p>
                                <p class="text-xl font-bold text-gray-900 dark:text-white">${state.balance !== null ? state.balance : 'Loading...'}</p>
                            </div>
                            <div class="flex-1">
                                <p class="text-sm text-gray-600 dark:text-gray-400">USDC</p>
                                <p class="text-xl font-bold text-gray-900 dark:text-white">${state.usdcBalance !== null ? state.usdcBalance : 'Loading...'}</p>
                            </div>
                            <button id="refresh-balance-btn" class="text-sm text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-200 transition-colors duration-200">
                                Refresh
                            </button>
                        </div>
                    </div>
                    
                    <!-- Send Payment Form -->
                    <form id="send-payment-form" class="space-y-4 bg-gray-100 dark:bg-gray-700 p-6 rounded-lg shadow-inner">
                        <h2 class="text-xl font-semibold text-gray-900 dark:text-white flex items-center gap-2"><i data-lucide="send" class="icon"></i> Send Payment</h2>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300">Destination Public Key</label>
                            <input type="text" id="destination-key" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 dark:bg-gray-600 dark:border-gray-500 dark:text-white p-2" required />
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300">Asset</label>
                            <select id="send-asset" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 dark:bg-gray-600 dark:border-gray-500 dark:text-white p-2">
                                <option value="native">XLM</option>
                                <option value="USDC">USDC</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-gray-700 dark:text-gray-300">Amount</label>
                            <input type="number" id="send-amount" step="0.0000001" min="0.0000001" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 dark:bg-gray-600 dark:border-gray-500 dark:text-white p-2" required />
                        </div>
                        <button type="submit" class="w-full bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 transition-colors duration-200">
                            Send
                        </button>
                    </form>

                    <!-- Anchor Deposit / Withdraw Section -->
                    <div class="bg-gray-100 dark:bg-gray-700 p-6 rounded-lg shadow-inner">
                        <h2 class="text-xl font-semibold text-gray-900 dark:text-white flex items-center gap-2 mb-4"><i data-lucide="banknote" class="icon"></i> Fiat On/Off-Ramp (SEP-24)</h2>
                        <div class="flex gap-2 mb-4">
                            <button id="deposit-btn" class="bg-emerald-600 text-white py-2 px-4 rounded-md hover:bg-emerald-700 transition-colors duration-200">Deposit USDC</button>
                            <button id="withdraw-btn" class="bg-orange-600 text-white py-2 px-4 rounded-md hover:bg-orange-700 transition-colors duration-200">Withdraw USDC</button>
                            <button id="refresh-anchor-btn" class="ml-auto text-sm text-blue-600 hover:text-blue-800">Refresh</button>
                        </div>
                        ${renderAnchorTxList()}
                    </div>

                    <!-- Transaction History Section -->
                    <div class="bg-gray-100 dark:bg-gray-700 p-6 rounded-lg shadow-inner">
                        <h2 class="text-xl font-semibold text-gray-900 dark:text-white flex items-center gap-2 mb-4"><i data-lucide="history" class="icon"></i> Transaction History</h2>
                        <button id="fetch-history-btn" class="mb-4 bg-purple-600 text-white py-2 px-4 rounded-md hover:bg-purple-700 transition-colors duration-200">
                            Fetch History
                        </button>
                        ${renderHistoryList()}
                    </div>
                </div>
            ` : `
                <div class="text-center">
                    <p class="text-gray-700 dark:text-gray-300 mb-4">You don't have a wallet yet. Create one to get started!</p>
                    <button id="create-wallet-btn" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition-colors duration-200">
                        Create Wallet
                    </button>
                </div>
            `;

            return `
                <div class="flex flex-col items-center p-4 container mx-auto">
                    <header class="flex justify-between items-center w-full max-w-3xl mb-6">
                        <h1 class="text-3xl font-bold text-gray-800 dark:text-gray-100">Stellar Wallet Dashboard</h1>
                        <button id="logout-btn" class="flex items-center gap-2 bg-red-600 text-white py-2 px-4 rounded-md hover:bg-red-700 transition-colors duration-200">
                            <i data-lucide="log-out" class="icon"></i> Logout
                        </button>
                    </header>

                    <div class="bg-white dark:bg-gray-800 p-8 rounded-xl shadow-lg w-full max-w-3xl">
                        ${errorHtml}
                        ${messageHtml}
                        ${walletHtml}
                    </div>
                </div>
            `;
        }

        // Renders pending SEP-24 anchor transactions
        function renderAnchorTxList() {
            if (!state.anchorTxs || state.anchorTxs.length === 0) {
                return `<p class="text-sm text-gray-600 dark:text-gray-400">No anchor transactions yet.</p>`;
            }
            return `
                <ul class="space-y-2">
                    ${state.anchorTxs.map(tx => {
                        const needsSend = tx.kind === 'withdrawal' && tx.status === 'pending_user_transfer_start';
                        return `
                            <li class="bg-white dark:bg-gray-800 p-3 rounded-lg shadow text-sm">
                                <p><strong>${tx.kind === 'deposit' ? 'Deposit' : 'Withdraw'}</strong> — ${tx.amount_in || '?'} ${tx.asset_code || ''}</p>
                                <p class="text-gray-600 dark:text-gray-400">Status: <span class="font-mono">${tx.status}</span></p>
                                <p class="text-xs text-gray-500 font-mono break-all">id: ${tx.id}</p>
                                ${needsSend ? `<button data-tx-id="${tx.id}" class="complete-withdraw-btn mt-2 bg-orange-600 text-white py-1 px-3 rounded text-sm hover:bg-orange-700">Send ${tx.amount_in} USDC to anchor</button>` : ''}
                                ${tx.more_info_url ? `<a href="${tx.more_info_url}" target="_blank" class="block mt-1 text-xs text-blue-600 hover:underline">More info</a>` : ''}
                            </li>`;
                    }).join('')}
                </ul>
            `;
        }

        // Renders the transaction history list
        function renderHistoryList() {
            if (state.history.length > 0) {
                return `
                    <ul class="space-y-2">
                        ${state.history.map(tx => `
                            <li class="bg-white dark:bg-gray-800 p-4 rounded-lg shadow">
                                <p class="font-medium text-gray-900 dark:text-white">
                                    <strong>Type:</strong> ${tx.type || 'N/A'}
                                </p>
                                <p class="text-sm font-mono text-gray-600 dark:text-gray-400">
                                    <strong>From:</strong> ${tx.from ? tx.from.slice(0, 8) + '...' : 'N/A'}
                                </p>
                                <p class="text-sm font-mono text-gray-600 dark:text-gray-400">
                                    <strong>To:</strong> ${tx.to ? tx.to.slice(0, 8) + '...' : 'N/A'}
                                </p>
                                <p class="font-bold ${tx.from === (state.wallet ? state.wallet.publicKey : null) ? 'text-red-500' : 'text-green-500'}">
                                    ${tx.from === (state.wallet ? state.wallet.publicKey : null) ? '-' : '+'} ${tx.amount} ${tx.assetType === 'native' ? 'XLM' : (tx.asset_code || '???')}
                                </p>
                                <p class="text-xs text-gray-500 dark:text-gray-400 mt-1">${new Date(tx.date).toLocaleString()}</p>
                            </li>
                        `).join('')}
                    </ul>
                `;
            } else {
                return `<p class="text-gray-700 dark:text-gray-300">No transactions found.</p>`;
            }
        }

        // === Event Handlers ===

        // Attaches event listeners for the authentication view
        function attachAuthEvents() {
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            document.getElementById('register-form').addEventListener('submit', handleRegister);
        }

        // Attaches event listeners for the dashboard view
        function attachDashboardEvents() {
            document.getElementById('logout-btn').addEventListener('click', handleLogout);
            if (state.wallet) {
                document.getElementById('refresh-balance-btn').addEventListener('click', handleFetchBalance);
                document.getElementById('send-payment-form').addEventListener('submit', handleSendPayment);
                document.getElementById('fetch-history-btn').addEventListener('click', handleFetchHistory);
                document.getElementById('deposit-btn').addEventListener('click', () => handleAnchorInteractive('deposit'));
                document.getElementById('withdraw-btn').addEventListener('click', () => handleAnchorInteractive('withdraw'));
                document.getElementById('refresh-anchor-btn').addEventListener('click', handleFetchAnchorTxs);
                document.querySelectorAll('.complete-withdraw-btn').forEach(btn => {
                    btn.addEventListener('click', () => handleCompleteWithdraw(btn.dataset.txId));
                });
            } else {
                document.getElementById('create-wallet-btn').addEventListener('click', handleCreateWallet);
            }
        }

        // Opens the anchor's interactive URL in a popup and polls status
        async function handleAnchorInteractive(kind) {
            const data = await fetchApi(`anchor/${kind}`, 'POST');
            if (!data || !data.url) return;
            const popup = window.open(data.url, 'anchor', 'width=500,height=700');
            state.message = `${kind} initiated. Complete the flow in the popup.`;
            render();
            pollAnchorTx(data.id, popup);
        }

        async function pollAnchorTx(id, popup) {
            const interval = setInterval(async () => {
                const tx = await fetchApi(`anchor/transactions/${id}`);
                if (tx) {
                    const idx = state.anchorTxs.findIndex(t => t.id === id);
                    if (idx >= 0) state.anchorTxs[idx] = tx;
                    else state.anchorTxs.unshift(tx);
                    render();
                    if (['completed', 'error', 'refunded', 'expired'].includes(tx.status)) {
                        clearInterval(interval);
                        if (state.wallet) fetchBalance(state.wallet.publicKey);
                    }
                }
                if (popup && popup.closed) {
                    await handleFetchAnchorTxs();
                }
            }, 4000);
            // Stop polling after 10 minutes
            setTimeout(() => clearInterval(interval), 10 * 60 * 1000);
        }

        async function handleFetchAnchorTxs() {
            const data = await fetchApi('anchor/transactions');
            if (data) {
                state.anchorTxs = data;
                render();
            }
        }

        async function handleCompleteWithdraw(txId) {
            const data = await fetchApi(`anchor/transactions/${txId}/complete`, 'POST');
            if (data) {
                state.message = `Withdrawal payment sent: ${data.transactionHash}`;
                await handleFetchAnchorTxs();
                if (state.wallet) fetchBalance(state.wallet.publicKey);
            }
        }

        // Handler for user registration
        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const data = await fetchApi('auth/register', 'POST', { username, password });
            if (data) {
                state.message = 'Registration successful! You can now log in.';
                render();
            }
        }

        // Handler for user login
        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const data = await fetchApi('auth/login', 'POST', { username, password });
            if (data && data.token) {
                state.token = data.token;
                localStorage.setItem('token', data.token);
                state.isLoggedIn = true;
                state.view = 'dashboard';
                state.message = 'Login successful!';
                render();
                fetchWalletDetails();
            }
        }
        
        // Handler for user logout
        function handleLogout() {
            state.token = null;
            localStorage.removeItem('token');
            state.isLoggedIn = false;
            state.view = 'auth';
            state.wallet = null;
            state.balance = null;
            state.history = [];
            state.message = 'You have been logged out.';
            render();
        }

        // Handler for creating a new Stellar wallet
        async function handleCreateWallet() {
            const data = await fetchApi('wallet/create', 'POST');
            if (data) {
                state.message = 'Wallet created and funded successfully!';
                state.wallet = { publicKey: data.publicKey };
                render();
                fetchBalance(data.publicKey);
            }
        }

        // Fetches the balance for a given public key
        async function fetchBalance(publicKey) {
            const data = await fetchApi(`wallet/${publicKey}/balance`);
            if (data) {
                state.balance = data.balance;
                state.usdcBalance = data.usdcBalance;
                state.message = 'Balance fetched successfully.';
                render();
            }
        }
        
        // Handler to manually fetch the balance
        function handleFetchBalance() {
            if (state.wallet && state.wallet.publicKey) {
                fetchBalance(state.wallet.publicKey);
            }
        }

        // Fetches the transaction history for the user's wallet
        async function handleFetchHistory() {
            const data = await fetchApi('wallet/history');
            if (data) {
                state.history = data;
                state.message = 'Transaction history fetched successfully.';
                render();
            }
        }
        
        // Handler for sending a payment
        async function handleSendPayment(e) {
            e.preventDefault();
            const destination = document.getElementById('destination-key').value;
            const amount = document.getElementById('send-amount').value;
            const asset = document.getElementById('send-asset').value;
            const data = await fetchApi('wallet/send-payment', 'POST', {
                destinationPublicKey: destination,
                amount: amount,
                asset: asset,
            });
            if (data) {
                state.message = `Payment sent! Transaction hash: ${data.transactionHash}`;
                // Clear the form fields
                document.getElementById('destination-key').value = '';
                document.getElementById('send-amount').value = '';
                // Refresh balance and history
                fetchBalance(state.wallet.publicKey);
                handleFetchHistory();
            }
        }

        // Fetches all wallet-related details for the dashboard
        async function fetchWalletDetails() {
            const walletData = await fetchApi('wallet/me');
            if (walletData && walletData.publicKey) {
                state.wallet = { publicKey: walletData.publicKey };
                await fetchBalance(walletData.publicKey);
                const historyData = await fetchApi('wallet/history');
                if (historyData) state.history = historyData;
                const anchorTxs = await fetchApi('anchor/transactions');
                if (anchorTxs) state.anchorTxs = anchorTxs;
            } else {
                state.wallet = null;
            }
            render();
        }

        // === Initial App Load ===
        document.addEventListener('DOMContentLoaded', () => {
            if (state.token) {
                state.isLoggedIn = true;
                state.view = 'dashboard';
                fetchWalletDetails();
            }
            render();
        });

    </script>
</body>
</html>
